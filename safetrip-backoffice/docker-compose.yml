services:
  backoffice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: safetrip-backoffice
    restart: always
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:3001/api/v1
    # .env 파일이 존재할 경우 자동으로 로드
    env_file:
      - .env
    networks:
      - safetrip-network

networks:
  safetrip-network:
    driver: bridge
