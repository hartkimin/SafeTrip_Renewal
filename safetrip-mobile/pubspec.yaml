name: safetrip_mobile
description: "SafeTrip Geofence App - Background Location Tracking"
publish_to: 'none'

version: 1.1.0+29

environment:
  sdk: ^3.10.0-162.1.beta

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # 지도
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  flutter_map_animations: ^0.9.0
  flutter_map_marker_cluster: ^8.2.2
  flutter_polyline_points: ^3.1.0
  
  # 백그라운드 위치 추적
  flutter_background_geolocation: ^5.0.0
  
  # 권한 관리
  permission_handler: ^11.3.1
  
  # 로컬 저장소
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # Firebase (호환 버전으로 통일)
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  firebase_database: ^11.0.0
  firebase_auth: ^5.0.0
  firebase_storage: ^12.0.0
  
  # 상태 관리
  flutter_riverpod: ^2.6.1

  # 라우팅
  go_router: ^14.6.2

  # HTTP 클라이언트
  dio: ^5.4.0
  
  # UUID 생성
  uuid: ^4.2.1
  
  # 환경 변수
  flutter_dotenv: ^5.1.0
  
  # 역 지오코딩 (좌표 → 주소)
  geocoding: ^3.0.0
  
  # 날짜/시간 포맷팅 및 국제화
  intl: ^0.20.2
  
  # 타임존 처리
  timezone: ^0.9.2
  
  # WakeLock (화면 꺼짐 방지)
  wakelock_plus: ^1.2.1
  
  # 네트워크 상태 모니터링
  connectivity_plus: ^5.0.2

  # URL 실행
  url_launcher: ^6.2.5

  # 로컬 알림
  flutter_local_notifications: ^17.2.4

  # 앱 정보 (버전 등)
  package_info_plus: ^8.0.2

  # SQLite 데이터베이스
  sqflite: ^2.3.3
  path: ^1.9.0

  # SVG 지원
  flutter_svg: ^2.0.10+1

  # 비디오 플레이어
  video_player: ^2.8.2

  # 이미지 선택
  image_picker: ^1.0.7

  # 이미지 처리
  image: ^4.2.0

  # 네트워크 이미지 캐싱
  cached_network_image: ^3.3.0

  # 한글 초성 검색
  choseong_search: ^1.0.0

  # Font Awesome 아이콘
  font_awesome_flutter: ^10.7.0
  
  # 국가 플래그 아이콘
  country_flags: ^4.1.1

  # HTML 렌더링 (외교부 API HTML 콘텐츠)
  flutter_html: ^3.0.0-beta.2

  # XML 파싱 (외교부 공공데이터 API XML 응답)
  xml: ^6.5.0
  google_fonts: ^8.0.2
  google_maps_flutter: ^2.2.8
  google_maps: ^8.2.0
  google_maps_flutter_web: ^0.6.1
  google_maps_flutter_platform_interface: ^2.14.2
  google_maps_flutter_android: ^2.19.2
  google_maps_flutter_ios: ^2.17.5

  # QR 코드 생성
  qr_flutter: ^4.1.0

  # 시스템 공유 시트
  share_plus: ^10.1.4

  # 딥링크 처리
  app_links: ^6.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - .env
    - assets/images/
    - assets/images/bg.mp4
    - assets/icons/
    - assets/demo/
