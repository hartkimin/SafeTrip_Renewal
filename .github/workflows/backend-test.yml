name: Backend Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'safetrip-server-api/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'safetrip-server-api/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: safetrip
          POSTGRES_PASSWORD: safetrip_test
          POSTGRES_DB: safetrip_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: safetrip-server-api/package-lock.json

      - name: Install dependencies
        working-directory: safetrip-server-api
        run: npm ci

      - name: TypeScript type check
        working-directory: safetrip-server-api
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: safetrip-server-api
        run: npm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: safetrip_test
          DB_USER: safetrip
          DB_PASSWORD: safetrip_test
          DB_SSL: "false"
          JWT_SECRET: test-jwt-secret-minimum-32-characters
          FIREBASE_PROJECT_ID: test-project
          FIREBASE_CLIENT_EMAIL: test@test.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY: "-----BEGIN RSA PRIVATE KEY-----\nMIIEowIBAAKCAQEA0Z3VS5JJcds3xHn/ygWep4\n-----END RSA PRIVATE KEY-----"
          FIREBASE_DATABASE_URL: http://localhost:9000
